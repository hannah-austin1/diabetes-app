kind = "web"
previewPath = "/"
title = "Personal Website"
version = "1.0.0"
id = "artifacts/personal-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25158

[services.development]
run = "pnpm --filter @workspace/personal-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/personal-site", "run", "build" ]
run = "pnpm --filter @workspace/personal-site run start"

[services.env]
PORT = "25158"
